version: 2

models:
  - name: employee
    description: "Employee DBT Model"
    columns:
      - name: emp_id
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ['1','2','3','4','5']
                config:
                  severity: warn 
      - name: emp_salary
        data_tests:
          - salary_check
  - name: customer
    description: "DBT model for customer table"
  - name: customer_view
    description: "DBT model for customer view"
  - name: sales
    description: "DBT model for sales table"
  - name: product
    description: "DBT model for product table"


                  

sources:
  - name: employee
    database: DBT_DB
    schema: PUBLIC
    tables:
      
      - name: EMPLOYEE_RAW
  - name: customer
    database: DBT_DB
    schema: PUBLIC
    tables:

      - name: customer_src
  - name: sales
    database: DBT_DB
    schema: PUBLIC
    tables:

      - name: sales_src
  - name: product
    database: DBT_DB
    schema: PUBLIC
    tables:

      - name: product_src