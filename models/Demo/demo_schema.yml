version: 2

models:
  - name: employee
    description: "Employee DBT Model"
    columns:
      - name: emp_id
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ['1','2','3','4','5']
                config:
                  severity: warn 
      - name: emp_salary
        data_tests:
          - salary_check
  - name: customer
    description: "DBT model for customer table"
  - name: customer_view
    description: "DBT model for customer view"
  - name: sales
    description: "DBT model for sales table"
  - name: product
    description: "DBT model for product table"
  - name: purchase
    description: "DBT model for purchase table"
  - name: clean_orders
    description: "DBT ephemeral model for base orders"
  - name: final_orders
    description: "DBT model for final orders table"
  - name: session
    description: "DBT model for session table"



                  

