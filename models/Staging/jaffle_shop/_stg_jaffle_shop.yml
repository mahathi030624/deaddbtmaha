models:
  - name: stg_jaffle_shop_customers
    description: "The grain of this table is one unique customer per row"
    columns:
      - name: customer_id
        description: Primary key for the customers table
        data_tests:
          - unique
          - not_null
          
  - name: stg_jaffle_shop_orders
    description: "The grain of this table is one unique order per row"
    columns:
      - name: order_id
        description: Primary key for the orders table
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop_customers')
                field: customer_id