sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: A clone of a postgres app database.
   
    tables:
      - name: customers
        description: Raw customers data
        columns: 
          - name: id
            description: Primary Key for customer data.
            data_tests:
              - unique
              - not_null
      - name: orders
        description: Raw orders data
        columns:
          - name: id
            description: Primary Key for orders data
            data_tests:
              - unique 
              - not_null
                